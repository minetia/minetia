<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>암호화폐 실시간 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a0f;--card:#12121a;--card-hover:#1a1a28;--border:#1e1e2e;
--text:#e0e0e0;--text-dim:#888;--green:#00e676;--red:#ff1744;
--blue:#448aff;--purple:#b388ff;--orange:#ffab40;--cyan:#18ffff;
--yellow:#ffd740;--neon-green:#39ff14;--neon-red:#ff073a;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh}
a{color:var(--cyan);text-decoration:none}
.container{max-width:1400px;margin:0 auto;padding:12px}
header{text-align:center;padding:20px 0 10px;border-bottom:1px solid var(--border);margin-bottom:16px}
header h1{font-size:1.6rem;background:linear-gradient(90deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
header p{color:var(--text-dim);font-size:.82rem}
.status-bar{display:flex;justify-content:center;gap:16px;margin-top:8px;font-size:.75rem;color:var(--text-dim)}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* 요약 */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:16px}
.summary-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.summary-card .label{font-size:.72rem;color:var(--text-dim);margin-bottom:4px}
.summary-card .value{font-size:1.1rem;font-weight:700}

/* 코인 카드 */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:14px;margin-bottom:20px}
@media(max-width:500px){.cards{grid-template-columns:1fr}}
.coin-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;transition:border-color .3s,box-shadow .3s}
.coin-card:hover{border-color:var(--cyan);box-shadow:0 0 20px rgba(24,255,255,.08)}
.coin-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.coin-icon{width:36px;height:36px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem}
.coin-name{flex:1}
.coin-name h3{font-size:1rem;margin-bottom:1px}
.coin-name span{font-size:.72rem;color:var(--text-dim)}
.coin-price{text-align:right}
.coin-price .price{font-size:1.3rem;font-weight:700}
.coin-price .price-krw{font-size:.78rem;color:var(--text-dim)}
.flash{animation:flash-anim .5s}
@keyframes flash-anim{0%{background:rgba(255,255,255,.1)}100%{background:transparent}}

.changes{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:10px 0}
.change-item{background:rgba(255,255,255,.03);border-radius:6px;padding:6px 8px;text-align:center}
.change-item .lbl{font-size:.65rem;color:var(--text-dim)}
.change-item .val{font-size:.82rem;font-weight:600}
.up{color:var(--green)}.down{color:var(--red)}

.metrics{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0;font-size:.78rem}
.metric{display:flex;justify-content:space-between;background:rgba(255,255,255,.02);border-radius:4px;padding:5px 8px}
.metric .mk{color:var(--text-dim)}

.sparkline-wrap{height:50px;margin:8px 0}
.sparkline-wrap canvas{width:100%;height:100%}

/* 모멘텀 */
.momentum{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0}
.momentum-item{background:rgba(255,255,255,.03);border-radius:6px;padding:8px;text-align:center}
.momentum-item .mlbl{font-size:.65rem;color:var(--text-dim);margin-bottom:2px}
.momentum-item .mval{font-size:.9rem;font-weight:700}
.rsi-bar{height:4px;border-radius:2px;background:#333;margin-top:4px;overflow:hidden}
.rsi-fill{height:100%;border-radius:2px;transition:width .5s}

/* 거래소 */
.exchange-section{margin:10px 0}
.exchange-section summary{font-size:.78rem;color:var(--cyan);cursor:pointer;padding:4px 0}
.exchange-table{width:100%;border-collapse:collapse;font-size:.72rem;margin-top:6px}
.exchange-table th{color:var(--text-dim);text-align:left;padding:4px 6px;border-bottom:1px solid var(--border)}
.exchange-table td{padding:4px 6px;border-bottom:1px solid rgba(255,255,255,.03)}
.premium-badge{font-size:.65rem;padding:1px 5px;border-radius:3px;font-weight:600}

/* 전망 */
.outlook{margin:8px 0;padding:8px;border-radius:6px;font-size:.78rem;border-left:3px solid var(--blue)}
.outlook.bullish{border-left-color:var(--green);background:rgba(0,230,118,.05)}
.outlook.bearish{border-left-color:var(--red);background:rgba(255,23,68,.05)}
.outlook.neutral{border-left-color:var(--yellow);background:rgba(255,215,64,.05)}

/* 뉴스 */
.news-section{margin:8px 0}
.news-section h4{font-size:.78rem;color:var(--text-dim);margin-bottom:4px}
.news-item{font-size:.72rem;padding:3px 0;color:var(--text-dim)}
.news-item .dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:5px}

/* 상세 설명 */
.detail-section{margin-top:24px}
.detail-section h2{font-size:1.1rem;margin-bottom:14px;color:var(--cyan)}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:12px}
@media(max-width:500px){.detail-grid{grid-template-columns:1fr}}
.detail-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
.detail-card h3{font-size:.95rem;margin-bottom:6px;color:var(--purple)}
.detail-card p{font-size:.78rem;color:var(--text-dim);line-height:1.6}
.detail-card .tags{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px}
.detail-card .tag{font-size:.65rem;background:rgba(179,136,255,.12);color:var(--purple);padding:2px 8px;border-radius:10px}

footer{text-align:center;padding:20px;font-size:.7rem;color:var(--text-dim);border-top:1px solid var(--border);margin-top:20px}
.loading{text-align:center;padding:60px;font-size:1.1rem;color:var(--text-dim)}
.error-msg{background:rgba(255,23,68,.1);border:1px solid var(--red);border-radius:8px;padding:12px;margin:10px 0;font-size:.82rem;color:var(--red)}
</style>
</head>

function fmt(n,d=2){if(n==null)return '-';if(n>=1e12)return(n/1e12).toFixed(d)+'T';if(n>=1e9)return(n/1e9).toFixed(d)+'B';if(n>=1e6)return(n/1e6).toFixed(d)+'M';if(n>=1e3)return(n/1e3).toFixed(d)+'K';return n.toFixed(d)}
function fmtKRW(n){if(n==null)return '-';if(n>=1e12)return(n/1e12).toFixed(1)+'조';if(n>=1e8)return(n/1e8).toFixed(1)+'억';if(n>=1e4)return(n/1e4).toFixed(1)+'만';return n.toLocaleString('ko-KR')}
function fmtPrice(n){if(n==null)return '-';return n>=1?'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):'$'+n.toFixed(6)}
function fmtPriceKRW(n){if(n==null)return '-';return n.toLocaleString('ko-KR',{maximumFractionDigits:0})+'원'}
function chgClass(v){return v>0?'up':v<0?'down':''}
function chgSign(v){return v>0?'+':''}
function calcRSI(prices){
  if(!prices||prices.length<15)return 50;
  let gains=0,losses=0;
  for(let i=prices.length-14;i<prices.length;i++){
    let d=prices[i]-prices[i-1];
    if(d>0)gains+=d;else losses-=d;
  }
  if(losses===0)return 100;
  let rs=gains/losses;
  return 100-(100/(1+rs));
}
function rsiColor(v){return v>70?'var(--red)':v<30?'var(--green)':'var(--yellow)'}
function rsiLabel(v){return v>70?'과매수':v<30?'과매도':'중립'}
function outlookInfo(rsi,chg24,volChg){
  let score=0;
  if(rsi>60)score--;if(rsi<40)score++;if(rsi>70)score--;if(rsi<30)score++;
  if(chg24>3)score++;if(chg24>7)score+=2;if(chg24<-3)score--;if(chg24<-7)score-=2;
  if(volChg>20)score++;if(volChg<-20)score--;
  if(score>=2)return{cls:'bullish',icon:'▲',text:'단기 상승 모멘텀이 감지됩니다. 거래량 증가와 가격 상승세가 동반되고 있습니다.'};

  return{cls:'neutral',icon:'■',text:'뚜렷한 방향성 없이 횡보 중입니다. 거래량 변화를 주시하세요.'};

async function fetchPrices(){
  const ids=COINS.map(c=>c.id).join(',');
  const url='https://api.coingecko.com/api/v3/simple/price?ids='+ids+'&vs_currencies=usd,krw&include_24hr_vol=true&include_24hr_change=true&include_market_cap=true&include_last_updated_at=true';
  const r=await fetch(url);
  if(!r.ok)throw new Error('API 응답 오류: '+r.status);
  return r.json();
}

async function fetchMarketData(){
  const ids=COINS.map(c=>c.id).join(',');
  const url='https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids='+ids+'&order=market_cap_desc&sparkline=true&price_change_percentage=1h,24h,7d';
  const r=await fetch(url);
  if(!r.ok)throw new Error('Market API 오류: '+r.status);
  return r.json();
}

async function fetchTickers(coinId){
  try{
    const url='https://api.coingecko.com/api/v3/coins/'+coinId+'/tickers?include_exchange_logo=false&depth=false';
    const r=await fetch(url);
    if(!r.ok)return[];
    const d=await r.json();
    return d.tickers||[];
  }catch(e){return[];}
}

function renderCards(priceData,marketData){
  const area=document.getElementById('cardsArea');
  let html='';
  let totalMcap=0,totalVol=0,changes=[];

  COINS.forEach(coin=>{
    const p=priceData[coin.id]||{};
    const m=(marketData||[]).find(x=>x.id===coin.id)||{};
    const usd=p.usd||m.current_price||0;
    const krw=p.krw||0;
    const chg24=p.usd_24h_change||m.price_change_percentage_24h||0;
    const vol24=p.usd_24h_vol||m.total_volume||0;
    const mcap=p.usd_market_cap||m.market_cap||0;
    const chg1h=m.price_change_percentage_1h_in_currency||0;
    const chg7d=m.price_change_percentage_7d_in_currency||0;
    const sparkPrices=m.sparkline_in_7d?m.sparkline_in_7d.price:[];

    totalMcap+=mcap;totalVol+=vol24;changes.push(chg24);

    if(sparkPrices.length>0)sparkData[coin.id]=sparkPrices;
    const sp=sparkData[coin.id]||[];
    const rsi=calcRSI(sp);
    const volChg=prevPrices[coin.id]?(((vol24-prevPrices[coin.id].vol)/prevPrices[coin.id].vol)*100):0;
    const prevUsd=prevPrices[coin.id]?prevPrices[coin.id].usd:usd;
    const flashClass=Math.abs(usd-prevUsd)>0.0001?'flash':'';
    const diff24=usd*(chg24/100)/(1+chg24/100);
    const ol=outlookInfo(rsi,chg24,volChg);
    const exInfo=EXCHANGES[coin.id]||{domestic:[],global:[]};
    const news=NEWS_DATA[coin.id]||[];
    const tickers=tickerCache[coin.id]||[];

    // 거래소별 가격
    let exRows='';
    let domesticAvg=0,globalAvg=0,dCount=0,gCount=0;
    tickers.slice(0,15).forEach(t=>{
      const eName=t.market?t.market.name:'';
      const ePrice=t.converted_last?t.converted_last.usd:0;
      if(!ePrice)return;
      const diff=usd>0?((ePrice-usd)/usd*100):0;
      const isDomestic=['Upbit','Bithumb','Coinone'].some(d=>eName.includes(d));
      if(isDomestic){domesticAvg+=ePrice;dCount++}else{globalAvg+=ePrice;gCount++}
      const diffCls=diff>0?'up':'down';
      const premBg=diff>1?'background:rgba(0,230,118,.15);color:var(--green)':diff<-1?'background:rgba(255,23,68,.15);color:var(--red)':'background:rgba(255,255,255,.08);color:var(--text-dim)';
      exRows+='<tr><td>'+eName+'</td><td>'+fmtPrice(ePrice)+'</td><td class="'+diffCls+'"><span class="premium-badge" style="'+premBg+'">'+(diff>0?'+':'')+diff.toFixed(2)+'%</span></td></tr>';
    });

    let kimchiPremium='-';
    if(dCount>0&&gCount>0){
      domesticAvg/=dCount;globalAvg/=gCount;
      const kp=((domesticAvg-globalAvg)/globalAvg*100);
      kimchiPremium='<span class="'+(kp>0?'up':'down')+'">'+(kp>0?'+':'')+kp.toFixed(2)+'%</span>';
    }

    html+='<div class="coin-card '+flashClass+'" id="card-'+coin.id+'">';
    html+='<div class="coin-header">';
    html+='<div class="coin-icon" style="background:'+coin.color+';color:#fff">'+coin.symbol.slice(0,2)+'</div>';
    html+='<div class="coin-name"><h3>'+coin.name+' ('+coin.symbol+')</h3><span>'+coin.id+'</span></div>';
    html+='<div class="coin-price"><div class="price '+chgClass(chg24)+'">'+fmtPrice(usd)+'</div><div class="price-krw">'+fmtPriceKRW(krw)+'</div></div>';
    html+='</div>';

    html+='<div class="changes">';
    html+='<div class="change-item"><div class="lbl">1시간</div><div class="val '+chgClass(chg1h)+'">'+chgSign(chg1h)+chg1h.toFixed(2)+'%</div></div>';
    html+='<div class="change-item"><div class="lbl">24시간</div><div class="val '+chgClass(chg24)+'">'+chgSign(chg24)+chg24.toFixed(2)+'%</div></div>';
    html+='<div class="change-item"><div class="lbl">7일</div><div class="val '+chgClass(chg7d)+'">'+chgSign(chg7d)+chg7d.toFixed(2)+'%</div></div>';
    html+='</div>';

    html+='<div class="metrics">';
    html+='<div class="metric"><span class="mk">등락폭(24h)</span><span class="'+chgClass(diff24)+'">'+chgSign(diff24)+fmtPrice(Math.abs(diff24))+'</span></div>';
    html+='<div class="metric"><span class="mk">거래량(24h)</span><span>$'+fmt(vol24)+'</span></div>';
    html+='<div class="metric"><span class="mk">시가총액</span><span>$'+fmt(mcap)+'</span></div>';
    html+='<div class="metric"><span class="mk">시총(KRW)</span><span>'+fmtKRW(mcap*(krw/usd||1350))+'</span></div>';
    html+='</div>';

    html+='<div class="sparkline-wrap"><canvas id="spark-'+coin.id+'"></canvas></div>';

    html+='<div class="momentum">';
    html+='<div class="momentum-item"><div class="mlbl">RSI (근사치)</div><div class="mval" style="color:'+rsiColor(rsi)+'">'+rsi.toFixed(1)+' ('+rsiLabel(rsi)+')</div><div class="rsi-bar"><div class="rsi-fill" style="width:'+rsi+'%;background:'+rsiColor(rsi)+'"></div></div></div>';
    html+='<div class="momentum-item"><div class="mlbl">거래량 변화</div><div class="mval '+chgClass(volChg)+'">'+chgSign(volChg)+volChg.toFixed(1)+'%</div></div>';
    html+='</div>';

    html+='<div class="outlook '+ol.cls+'">'+ol.icon+' <strong>전망:</strong> '+ol.text+'</div>';

    // 거래소
    html+='<details class="exchange-section"><summary>거래소 정보 (국내: '+exInfo.domestic.join(', ')+' / 해외: '+exInfo.global.join(', ')+')  |  김치 프리미엄: '+kimchiPremium+'</summary>';
    if(exRows){
      html+='<table class="exchange-table"><thead><tr><th>거래소</th><th>가격(USD)</th><th>차이</th></tr></thead><tbody>'+exRows+'</tbody></table>';
    }else{
      html+='<p style="font-size:.72rem;color:var(--text-dim);padding:6px 0">거래소 데이터 로딩 중...</p>';
    }
    html+='</details>';

    // 뉴스
    html+='<div class="news-section"><h4>이벤트 / 뉴스</h4>';
    news.forEach(n=>{
      const dotColor=n.type==='good'?'var(--green)':n.type==='bad'?'var(--red)':'var(--blue)';
      html+='<div class="news-item"><span class="dot" style="background:'+dotColor+'"></span>'+n.text+'</div>';
    });
    html+='</div>';

    html+='</div>';

    prevPrices[coin.id]={usd:usd,vol:vol24};
  });

  area.innerHTML=html;

  // Summary
  const avgChg=changes.length>0?changes.reduce((a,b)=>a+b,0)/changes.length:0;
  const btcMcap=priceData.bitcoin?priceData.bitcoin.usd_market_cap||0:0;
  const dom=totalMcap>0?(btcMcap/totalMcap*100):0;
  document.getElementById('totalMcap').textContent='$'+fmt(totalMcap,1);
  document.getElementById('totalMcap').className='value '+chgClass(avgChg);
  const avgEl=document.getElementById('avgChange');
  avgEl.textContent=chgSign(avgChg)+avgChg.toFixed(2)+'%';
  avgEl.className='value '+chgClass(avgChg);
  document.getElementById('totalVol').textContent='$'+fmt(totalVol,1);
  document.getElementById('btcDom').textContent=dom.toFixed(1)+'%';

  // Sparklines
  COINS.forEach(coin=>{
    const sp=sparkData[coin.id]||[];
    if(sp.length<2)return;
    const canvas=document.getElementById('spark-'+coin.id);
    if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const existing=Chart.getChart(canvas);
    if(existing)existing.destroy();
    const isUp=sp[sp.length-1]>=sp[0];
    const color=isUp?'rgba(0,230,118,':'rgba(255,23,68,';
    new Chart(ctx,{
      type:'line',
      data:{labels:sp.map((_,i)=>i),datasets:[{data:sp,borderColor:color+'1)',backgroundColor:color+'0.1)',fill:true,pointRadius:0,borderWidth:1.5,tension:.3}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}},animation:{duration:0}}
    });
  });
}

function renderDetails(){
  const area=document.getElementById('detailArea');
  let html='';
  COINS.forEach(coin=>{
    const d=COIN_DETAILS[coin.id]||{desc:'-',tags:[]};
    html+='<div class="detail-card">';
    html+='<h3 style="color:'+coin.color+'">'+coin.symbol+' - '+coin.name+'</h3>';
    html+='<p>'+d.desc+'</p>';
    html+='<div class="tags">'+d.tags.map(t=>'<span class="tag">'+t+'</span>').join('')+'</div>';
    html+='</div>';
  });
  area.innerHTML=html;
}

let tickerIdx=0;
async function fetchTickersRotating(){
  const coin=COINS[tickerIdx%COINS.length];
  tickerIdx++;
  const tickers=await fetchTickers(coin.id);
  if(tickers.length>0)tickerCache[coin.id]=tickers;
}

async function update(){
  try{
    const[priceData,marketData]=await Promise.all([fetchPrices(),fetchMarketData()]);
    renderCards(priceData,marketData);
    document.getElementById('statusDot').style.background='var(--green)';
    document.getElementById('statusText').textContent='실시간 연결됨';
    document.getElementById('lastUpdate').textContent='마지막 업데이트: '+new Date().toLocaleTimeString('ko-KR');
    document.getElementById('errorArea').innerHTML='';
  }catch(e){
    console.error(e);
    document.getElementById('statusDot').style.background='var(--red)';
    document.getElementById('statusText').textContent='연결 오류';
    document.getElementById('errorArea').innerHTML='<div class="error-msg">API 오류: '+e.message+' (자동 재시도 중...)</div>';
  }
}

renderDetails();
update();
setInterval(update,5000);
setInterval(fetchTickersRotating,8000);
setTimeout(fetchTickersRotating,2000);
</script>
</body>
</html>
